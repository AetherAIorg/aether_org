# Unified stack for aether_org (everything except prev/).
#
#   docker compose up -d --build
#
# Services:
#   MetricGraph  — mg-api :8000, mg-frontend :3000, Neo4j :7474
#   Catalog      — catalog-api :8090, catalog-frontend :3001
#   Hub          — hub :8080
#   Ingest       — ingest-engine (file watcher → mg-api + hub)
#   Pages        — margin-pages :4000

name: aether

services:
  # ── MetricGraph infrastructure ─────────────────────────────────────────────

  mg-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: metricgraph
      POSTGRES_PASSWORD: metricgraph
      POSTGRES_DB: metricgraph
    ports:
      - "5432:5432"
    volumes:
      - mg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metricgraph"]
      interval: 5s
      timeout: 5s
      retries: 10

  mg-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mg-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mg_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mg-minio-init:
    image: minio/mc:latest
    depends_on:
      mg-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://mg-minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/metricgraph
      "

  mg-neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/metricgraph
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - mg_neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MetricGraph app ─────────────────────────────────────────────────────────

  mg-api:
    build:
      context: ./metricgraph/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://metricgraph:metricgraph@mg-postgres:5432/metricgraph
      REDIS_URL: redis://mg-redis:6379/0
      S3_ENDPOINT: http://mg-minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: metricgraph
      NEO4J_URI: bolt://mg-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: metricgraph
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      INTEGRATION_WEBHOOK_URL: http://hub:8080/webhooks/metricgraph
      INTEGRATION_WEBHOOK_SECRET: ${HUB_WEBHOOK_SECRET:-change-me}
      GOVERNANCE_WEBHOOK_URL: http://catalog-api:8090/webhooks/metricgraph
      GOVERNANCE_WEBHOOK_SECRET: ${CATALOG_WEBHOOK_SECRET:-change-me}
    ports:
      - "8000:8000"
    depends_on:
      mg-postgres:
        condition: service_healthy
      mg-redis:
        condition: service_healthy
      mg-neo4j:
        condition: service_healthy
      mg-minio-init:
        condition: service_completed_successfully
    volumes:
      - ./metricgraph/backend:/app
      - ./metricgraph/demo:/demo

  mg-worker:
    build:
      context: ./metricgraph/backend
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://metricgraph:metricgraph@mg-postgres:5432/metricgraph
      REDIS_URL: redis://mg-redis:6379/0
      S3_ENDPOINT: http://mg-minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: metricgraph
      NEO4J_URI: bolt://mg-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: metricgraph
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      INTEGRATION_WEBHOOK_URL: http://hub:8080/webhooks/metricgraph
      INTEGRATION_WEBHOOK_SECRET: ${HUB_WEBHOOK_SECRET:-change-me}
      GOVERNANCE_WEBHOOK_URL: http://catalog-api:8090/webhooks/metricgraph
      GOVERNANCE_WEBHOOK_SECRET: ${CATALOG_WEBHOOK_SECRET:-change-me}
    depends_on:
      mg-postgres:
        condition: service_healthy
      mg-redis:
        condition: service_healthy
      mg-neo4j:
        condition: service_healthy
      mg-minio-init:
        condition: service_completed_successfully
    volumes:
      - ./metricgraph/backend:/app
      - ./metricgraph/demo:/demo

  mg-frontend:
    build:
      context: ./metricgraph/frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_CATALOG_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - mg-api

  # ── Margin Catalog (registry_governance) ───────────────────────────────────

  catalog-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    ports:
      - "5433:5432"
    volumes:
      - catalog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog-api:
    build:
      context: ./registry_governance/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://catalog:catalog@catalog-postgres:5432/catalog
      METRICGRAPH_BASE_URL: http://mg-api:8000
      REGISTRY_BASE_URL: http://localhost:3000
      METRICGRAPH_MATERIALIZE_URL: http://mg-api:8000/api/v1/graph/materialize
      METRICGRAPH_API_KEY: ${MARGIN_API_KEY:-}
      WEBHOOK_SECRET: ${CATALOG_WEBHOOK_SECRET:-change-me}
      CORS_ORIGINS: http://localhost:3001
    ports:
      - "8090:8090"
    depends_on:
      catalog-postgres:
        condition: service_healthy
      mg-api:
        condition: service_started
    volumes:
      - ./registry_governance/backend:/app

  catalog-frontend:
    build:
      context: ./registry_governance/frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8090
      NEXT_PUBLIC_REGISTRY_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - catalog-api
    volumes:
      - ./registry_governance/frontend:/app
      - /app/node_modules

  # ── Integration hub ───────────────────────────────────────────────────────

  hub:
    build:
      context: ./integration_hub
      dockerfile: Dockerfile
    environment:
      METRICGRAPH_BASE_URL: http://mg-api:8000
      MARGIN_API_KEY: ${MARGIN_API_KEY:-}
      HUB_WEBHOOK_SECRET: ${HUB_WEBHOOK_SECRET:-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      STATE_DB: /app/state/.hub_state.db
      HUB_CONFIG_FILE: config.yaml
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET:-}
      LINEAR_TEAM_ID: ${LINEAR_TEAM_ID:-}
    ports:
      - "8080:8080"
    depends_on:
      - mg-api
    volumes:
      - ./integration_hub:/app
      - hub_state:/app/state

  # ── Ingest engine (file watcher) ──────────────────────────────────────────

  ingest-engine:
    build:
      context: ./ingest_engine
      dockerfile: Dockerfile
    environment:
      METRICGRAPH_BASE_URL: http://mg-api:8000
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      HUB_WEBHOOK_URL: http://hub:8080/webhooks/ingest
      HUB_WEBHOOK_SECRET: ${HUB_WEBHOOK_SECRET:-change-me}
      INGEST_POLL_INTERVAL: ${INGEST_POLL_INTERVAL:-10}
    depends_on:
      mg-api:
        condition: service_started
      hub:
        condition: service_started
    volumes:
      - ./metricgraph/demo:/demo:ro
      - ingest_data:/data
    restart: unless-stopped

  # ── Static marketing site ─────────────────────────────────────────────────

  margin-pages:
    build:
      context: ./margin_github_pages
      dockerfile: Dockerfile
    ports:
      - "4000:80"

volumes:
  mg_pgdata:
  mg_miniodata:
  mg_neo4jdata:
  catalog_pgdata:
  hub_state:
  ingest_data:
